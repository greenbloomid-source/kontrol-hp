<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontrol No. HP</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; padding: 24px; }
  .wrap { max-width: 960px; margin: 0 auto; }
  .header-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  h1 { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: #94a3b8; margin-top: 3px; }
  .sync-badge { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
  .sync-ok { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .sync-load { background: #fefce8; color: #ca8a04; border: 1px solid #fde68a; }
  .sync-err { background: #fff1f2; color: #dc2626; border: 1px solid #fecaca; cursor: pointer; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 22px 0 20px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 14px 18px; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stat-val { font-size: 26px; font-weight: 800; }
  .stat-lbl { font-size: 12px; color: #94a3b8; margin-top: 2px; font-weight: 500; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  input, select, textarea { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 11px; color: #1e293b; font-size: 13px; outline: none; width: 100%; font-family: inherit; transition: border .15s; }
  input:focus, select:focus, textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px #6366f120; }
  .controls input { flex: 1; min-width: 160px; }
  .controls select { width: auto; }
  .btn { border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; transition: opacity .15s; }
  .btn:hover { opacity: .88; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; font-weight: 500; }
  .btn-sm { padding: 5px 13px; font-size: 12px; font-weight: 500; border-radius: 7px; cursor: pointer; font-family: inherit; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; transition: background .12s; }
  .btn-sm:hover { background: #e2e8f0; }
  .btn-danger { color: #ef4444; border-color: #fecaca; }
  .btn-danger:hover { background: #fff1f2; }
  .list { display: grid; gap: 10px; }
  .list-empty { background: #fff; border-radius: 12px; padding: 40px; text-align: center; color: #cbd5e1; border: 1px dashed #e2e8f0; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 1px 4px rgba(0,0,0,.05); padding: 16px 20px; display: grid; grid-template-columns: 1fr auto; gap: 14px; }
  .card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .nomor { font-size: 16px; font-weight: 800; color: #0f172a; font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }
  .tag-op { font-size: 11px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 2px 8px; color: #64748b; font-weight: 600; }
  .tag-status { font-size: 11px; border-radius: 6px; padding: 2px 9px; font-weight: 700; }
  .tag-price { font-size: 12px; color: #94a3b8; margin-left: 2px; }
  .card-meta { display: flex; gap: 18px; flex-wrap: wrap; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .mp-section { margin-top: 8px; }
  .mp-section-lbl { font-size: 11px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .mp-table { display: grid; gap: 5px; }
  .mp-row { display: flex; align-items: center; gap: 8px; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 8px; padding: 6px 10px; }
  .mp-name { font-size: 12px; font-weight: 700; color: #334155; min-width: 110px; }
  .mp-akun { font-size: 12px; color: #6366f1; font-weight: 600; }
  .mp-akun-empty { font-size: 12px; color: #cbd5e1; font-style: italic; }
  .card-note { margin-top: 8px; font-size: 12px; color: #94a3b8; font-style: italic; border-top: 1px solid #f1f5f9; padding-top: 6px; }
  .card-actions { display: flex; flex-direction: column; gap: 6px; justify-content: flex-start; padding-top: 2px; }
  .modal-bg { position: fixed; inset: 0; background: #0f172a99; display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #fff; border-radius: 18px; border: 1px solid #e2e8f0; box-shadow: 0 20px 60px rgba(0,0,0,.15); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; padding: 26px; }
  .modal h2 { font-size: 16px; font-weight: 800; color: #0f172a; margin-bottom: 20px; }
  .form-grid { display: grid; gap: 14px; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; font-weight: 600; }
  .mp-form-list { display: grid; gap: 8px; margin-top: 6px; }
  .mp-form-row { display: grid; grid-template-columns: 130px 1fr 32px; gap: 6px; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 9px; padding: 7px 10px; }
  .mp-form-name { font-size: 12px; font-weight: 700; color: #334155; }
  .mp-form-row input { padding: 5px 8px; font-size: 12px; border-radius: 6px; }
  .mp-toggle { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #e2e8f0; background: #f1f5f9; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0; }
  .mp-toggle.on { background: #6366f1; border-color: #6366f1; color: #fff; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 6px; border-top: 1px solid #f1f5f9; margin-top: 4px; }
  .section-divider { font-size: 11px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .hidden { display: none; }
  /* Login gate */
  .gate { position: fixed; inset: 0; background: linear-gradient(135deg,#6366f1,#8b5cf6); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .gate-box { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.25); text-align: center; }
  .gate-box h2 { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
  .gate-box p { font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
  .gate-box input { text-align: center; font-size: 15px; padding: 11px; margin-bottom: 12px; }
  .gate-err { color: #dc2626; font-size: 12px; margin-top: -4px; margin-bottom: 12px; min-height: 16px; }
  .overlay { position: fixed; inset: 0; background: #ffffffcc; display: flex; align-items: center; justify-content: center; z-index: 150; font-size: 14px; color: #6366f1; font-weight: 600; }
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row2 { grid-template-columns: 1fr; }
    .mp-form-row { grid-template-columns: 100px 1fr 32px; }
  }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div style="font-size:40px;margin-bottom:8px">📱</div>
    <h2>Kontrol No. HP</h2>
    <p>Masukkan password untuk akses data</p>
    <input type="password" id="gate-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="gate-err" id="gate-err"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk</button>
  </div>
</div>

<div class="overlay hidden" id="overlay">Memuat data…</div>

<div class="wrap hidden" id="app">
  <div class="header-bar">
    <div>
      <h1>📱 Kontrol No. HP</h1>
      <p class="subtitle">Masa aktif · Perangkat · Akun Marketplace</p>
    </div>
    <div class="sync-badge sync-ok" id="sync" onclick="reloadData()"><span class="dot"></span><span id="sync-txt">Tersinkron</span></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="controls">
    <input type="text" id="search" placeholder="🔍  Cari nomor / HP / operator / akun..." oninput="render()">
    <select id="filterOp" onchange="render()"></select>
    <select id="filterStatus" onchange="render()">
      <option>Semua</option><option>Aktif</option><option>Segera habis</option><option>Kritis</option><option>Kadaluarsa</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="masaAktifHingga">Sort: Masa Aktif</option>
      <option value="nomor">Sort: Nomor</option>
      <option value="operator">Sort: Operator</option>
    </select>
    <button class="btn btn-primary" onclick="openAdd()">+ Tambah</button>
  </div>
  <div class="list" id="list"></div>
</div>

<!-- Modal -->
<div class="modal-bg hidden" id="modal">
  <div class="modal">
    <h2 id="modal-title">Tambah Nomor</h2>
    <div class="form-grid">
      <div><label>Nomor HP *</label><input id="f-nomor" placeholder="0812-3456-7890"></div>
      <div class="form-row2">
        <div><label>Operator</label><select id="f-operator"></select></div>
        <div><label>Biaya Paket/bulan (Rp)</label><input id="f-biaya" type="number" placeholder="150000"></div>
      </div>
      <div class="form-row2">
        <div><label>Aktif Sejak</label><input id="f-aktifSejak" type="date"></div>
        <div><label>Masa Aktif Hingga</label><input id="f-masaAktifHingga" type="date"></div>
      </div>
      <div class="form-row2">
        <div><label>Nama HP / Perangkat</label><input id="f-hp" placeholder="Samsung S24"></div>
        <div><label>Slot SIM</label><input id="f-perangkat" placeholder="Slot 1 / eSIM"></div>
      </div>
      <div>
        <div class="section-divider">Marketplace &amp; Akun</div>
        <div class="mp-form-list" id="mp-form-list"></div>
      </div>
      <div><label>Catatan</label><textarea id="f-catatan" rows="2" placeholder="Nomor utama, backup, dll..."></textarea></div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveForm()">Simpan</button>
      </div>
    </div>
  </div>
</div>

<script>
// ====== KONFIGURASI ======
// 1. Deploy Code.gs sebagai Web App, salin URL /exec ke sini:
const API_URL = "https://script.google.com/macros/s/AKfycbzB717ajdOgT94rnxm0zQW3cQ9-1nbTN2QacOpibrUfl8HVE3hmBG3BhzMTq0ilKV_E/exec";
// 2. Password harus SAMA dengan APP_PASSWORD di Code.gs
// (password tidak ditulis di sini — user input saat login)
// ==========================

const OPERATORS = ["Telkomsel","Indosat","XL","Tri","Smartfren","Axis","By.U","Lainnya"];
const MARKETPLACES = ["Shopee","TikTok Shop","Tokopedia","Lazada","WhatsApp Business","Instagram","Facebook","Lainnya"];

let data = [];
let editingId = null;
let mpState = {};
let PW = "";

const today = new Date();
const daysLeft = exp => exp ? Math.ceil((new Date(exp) - today) / 86400000) : null;
const fmt = d => d ? new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"}) : "-";
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function statusColor(d){if(d===null)return"#94a3b8";if(d<0)return"#ef4444";if(d<=7)return"#f97316";if(d<=30)return"#f59e0b";return"#22c55e";}
function statusLabel(d){if(d===null)return"Tidak diketahui";if(d<0)return"Kadaluarsa";if(d<=7)return"Kritis";if(d<=30)return"Segera habis";return"Aktif";}
function statusBg(d){if(d===null)return"#f1f5f9";if(d<0)return"#fff1f2";if(d<=7)return"#fff7ed";if(d<=30)return"#fefce8";return"#f0fdf4";}

// ====== SYNC ======
function setSync(state, txt) {
  const el = document.getElementById("sync");
  el.className = "sync-badge " + (state==="ok"?"sync-ok":state==="load"?"sync-load":"sync-err");
  document.getElementById("sync-txt").textContent = txt;
}

async function apiGet() {
  const r = await fetch(API_URL + "?pw=" + encodeURIComponent(PW));
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || "gagal");
  return j.data;
}

async function apiSave(records) {
  // text/plain hindari CORS preflight ke Apps Script
  const r = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ pw: PW, data: records })
  });
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || "gagal");
  return j.data;
}

async function persist() {
  setSync("load","Menyimpan…");
  try {
    data = await apiSave(data);
    setSync("ok","Tersinkron");
    render();
  } catch(e) {
    setSync("err","Gagal simpan — tap utk coba lagi");
  }
}

async function reloadData() {
  setSync("load","Memuat…");
  try {
    data = await apiGet();
    setSync("ok","Tersinkron");
    render();
  } catch(e) {
    setSync("err","Gagal muat — tap utk coba lagi");
  }
}

// ====== LOGIN ======
async function doLogin() {
  const pw = document.getElementById("gate-pw").value;
  const errEl = document.getElementById("gate-err");
  errEl.textContent = "";
  if (!pw) { errEl.textContent = "Password kosong."; return; }
  if (API_URL.indexOf("PASTE_URL") === 0) { errEl.textContent = "API_URL belum diisi di file HTML."; return; }
  PW = pw;
  document.getElementById("overlay").classList.remove("hidden");
  try {
    data = await apiGet();
    document.getElementById("gate").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    setSync("ok","Tersinkron");
    initSelects();
    render();
  } catch(e) {
    errEl.textContent = "Gagal: " + (e && e.message ? e.message : e);
    PW = "";
  } finally {
    document.getElementById("overlay").classList.add("hidden");
  }
}

// ====== RENDER ======
function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase();
  const fOp = document.getElementById("filterOp").value;
  const fSt = document.getElementById("filterStatus").value;
  const sb = document.getElementById("sortBy").value;
  return data.filter(r=>{
    const mps=(r.marketplaces||[]).map(m=>(m.name+" "+(m.akun||"")).toLowerCase()).join(" ");
    const ms=!q||String(r.nomor).includes(q)||(r.hp||"").toLowerCase().includes(q)||r.operator.toLowerCase().includes(q)||mps.includes(q);
    const mo=fOp==="Semua"||r.operator===fOp;
    const d=daysLeft(r.masaAktifHingga);
    const mst=fSt==="Semua"?true:fSt==="Aktif"?d!==null&&d>30:fSt==="Segera habis"?d!==null&&d>7&&d<=30:fSt==="Kritis"?d!==null&&d>=0&&d<=7:fSt==="Kadaluarsa"?d!==null&&d<0:true;
    return ms&&mo&&mst;
  }).sort((a,b)=>{
    if(sb==="masaAktifHingga")return new Date(a.masaAktifHingga||0)-new Date(b.masaAktifHingga||0);
    if(sb==="nomor")return String(a.nomor).localeCompare(String(b.nomor));
    if(sb==="operator")return a.operator.localeCompare(b.operator);
    return 0;
  });
}

function render() {
  const filtered=getFiltered();
  const total=data.length,
    aktif=data.filter(r=>{const d=daysLeft(r.masaAktifHingga);return d!==null&&d>30;}).length,
    kritis=data.filter(r=>{const d=daysLeft(r.masaAktifHingga);return d!==null&&d>=0&&d<=7;}).length,
    expired=data.filter(r=>{const d=daysLeft(r.masaAktifHingga);return d!==null&&d<0;}).length;
  document.getElementById("stats").innerHTML=[
    {label:"Total",val:total,color:"#6366f1"},{label:"Aktif",val:aktif,color:"#22c55e"},
    {label:"Kritis ≤7h",val:kritis,color:"#f97316"},{label:"Expired",val:expired,color:"#ef4444"},
  ].map(s=>`<div class="stat-card"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-lbl">${s.label}</div></div>`).join("");
  if(!filtered.length){document.getElementById("list").innerHTML='<div class="list-empty">Tidak ada data.</div>';return;}
  document.getElementById("list").innerHTML=filtered.map(r=>{
    const d=daysLeft(r.masaAktifHingga),sc=statusColor(d),sl=statusLabel(d),sbg=statusBg(d);
    const dStr=d!==null?` (${d<0?Math.abs(d)+" hari lalu":d+" hari lagi"})`:"";
    const price=r.biayaPaket?`<span class="tag-price">Rp ${Number(r.biayaPaket).toLocaleString("id-ID")}/bln</span>`:"";
    const hp=r.hp?`<span>📱 ${esc(r.hp)}${r.perangkat?" · "+esc(r.perangkat):""}</span>`:"";
    const note=r.catatan?`<div class="card-note">📝 ${esc(r.catatan)}</div>`:"";
    const mps=(r.marketplaces||[]);
    const mpHtml=mps.length?`<div class="mp-section"><div class="mp-section-lbl">Marketplace (${mps.length})</div><div class="mp-table">${mps.map(m=>`<div class="mp-row"><span class="mp-name">${esc(m.name)}</span>${m.akun?`<span class="mp-akun">@${esc(m.akun).replace(/^@/,"")}</span>`:`<span class="mp-akun-empty">akun belum diisi</span>`}</div>`).join("")}</div></div>`:"";
    return `<div class="card"><div>
      <div class="card-top"><span class="nomor">${esc(r.nomor)}</span><span class="tag-op">${esc(r.operator)}</span><span class="tag-status" style="background:${sbg};color:${sc}">${sl}</span>${price}</div>
      <div class="card-meta"><span>📅 Aktif sejak ${fmt(r.aktifSejak)}</span><span style="color:${sc};font-weight:600">⏱ Hingga ${fmt(r.masaAktifHingga)}${dStr}</span>${hp}</div>
      ${mpHtml}${note}
    </div><div class="card-actions"><button class="btn-sm" onclick="openEdit('${r.id}')">Edit</button><button class="btn-sm btn-danger" onclick="delRow('${r.id}')">Hapus</button></div></div>`;
  }).join("");
}

function initSelects() {
  document.getElementById("filterOp").innerHTML='<option value="Semua">Semua Operator</option>'+OPERATORS.map(o=>`<option>${esc(o)}</option>`).join("");
  document.getElementById("f-operator").innerHTML=OPERATORS.map(o=>`<option>${esc(o)}</option>`).join("");
}

function initMpState(existing){mpState={};MARKETPLACES.forEach(mp=>{const f=(existing||[]).find(m=>m.name===mp);mpState[mp]={on:!!f,akun:f?f.akun:""};});}
function renderMpForm(){
  document.getElementById("mp-form-list").innerHTML=MARKETPLACES.map(mp=>{
    const s=mpState[mp];
    return `<div class="mp-form-row"><span class="mp-form-name">${esc(mp)}</span><input type="text" placeholder="nama akun" value="${esc(s.akun)}" ${s.on?'':'style="opacity:.4;pointer-events:none"'} oninput="mpState['${esc(mp)}'].akun=this.value"><button type="button" class="mp-toggle ${s.on?'on':''}" onclick="toggleMp('${esc(mp)}')">${s.on?'✓':'+'}</button></div>`;
  }).join("");
}
function toggleMp(mp){mpState[mp].on=!mpState[mp].on;renderMpForm();}

function openAdd(){
  editingId=null;initMpState([]);
  document.getElementById("modal-title").textContent="Tambah Nomor";
  ["f-nomor","f-biaya","f-aktifSejak","f-masaAktifHingga","f-hp","f-perangkat","f-catatan"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-operator").value="Telkomsel";
  renderMpForm();document.getElementById("modal").classList.remove("hidden");
}
function openEdit(id){
  const r=data.find(x=>String(x.id)===String(id));if(!r)return;
  editingId=r.id;initMpState(r.marketplaces||[]);
  document.getElementById("modal-title").textContent="Edit Nomor";
  document.getElementById("f-nomor").value=r.nomor||"";
  document.getElementById("f-operator").value=r.operator||"Telkomsel";
  document.getElementById("f-biaya").value=r.biayaPaket||"";
  document.getElementById("f-aktifSejak").value=r.aktifSejak||"";
  document.getElementById("f-masaAktifHingga").value=r.masaAktifHingga||"";
  document.getElementById("f-hp").value=r.hp||"";
  document.getElementById("f-perangkat").value=r.perangkat||"";
  document.getElementById("f-catatan").value=r.catatan||"";
  renderMpForm();document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){document.getElementById("modal").classList.add("hidden");}

function saveForm(){
  const nomor=document.getElementById("f-nomor").value.trim();
  if(!nomor){alert("Nomor HP wajib diisi.");return;}
  const mps=MARKETPLACES.filter(mp=>mpState[mp].on).map(mp=>({name:mp,akun:mpState[mp].akun.trim()}));
  const rec={nomor,operator:document.getElementById("f-operator").value,biayaPaket:document.getElementById("f-biaya").value,aktifSejak:document.getElementById("f-aktifSejak").value,masaAktifHingga:document.getElementById("f-masaAktifHingga").value,hp:document.getElementById("f-hp").value.trim(),perangkat:document.getElementById("f-perangkat").value.trim(),catatan:document.getElementById("f-catatan").value.trim(),marketplaces:mps};
  if(editingId!==null){data=data.map(r=>String(r.id)===String(editingId)?{...rec,id:editingId}:r);}
  else{rec.id=Date.now();data.push(rec);}
  closeModal();persist();
}
function delRow(id){if(!confirm("Hapus nomor ini?"))return;data=data.filter(r=>String(r.id)!==String(id));persist();}
